 "label": "hasInstructions"}, {"source": "recipes/pepper", "target": "recipes/ingredient", "label": "isA"}, {"source": "recipes/pepper", "target": "recipes/spice", "label": "isA"}, {"source": "recipes/salt", "target": "recipes/ingredient", "label": "isA"}, {"source": "recipes/salt", "target": "recipes/spice", "label": "isA"}, {"source": "recipes/spice", "target": "recipes/ingredient", "label": "isA"}, {"source": "sun", "target": "astronomy/star", "label": "partOf"}, {"source": "sun", "target": "physics/energy", "label": "partOf"}, {"source": "time", "target": "astronomy/planet", "label": "partOf"}, {"source": "time", "target": "physics/gravity", "label": "partOf"}, {"source": "water", "target": "biology/organism", "label": "partOf"}, {"source": "water", "target": "chemistry/water", "label": "partOf"}];
const kinds = ["ACTION", "ANSWER_TYPE", "BUILTIN", "CLASS", "FACT", "INGREDIENT", "INTERFACE", "INTERROGATIVE", "PACKAGE", "PLAN_TEMPLATE", "RECIPE", "SYNTACTIC_CONSTRUCT", "TYPE"];
const kindColors = {"ACTION": "#4e79a7", "ANSWER_TYPE": "#f28e2c", "BUILTIN": "#e15759", "CLASS": "#76b7b2", "FACT": "#59a14f", "INGREDIENT": "#edc949", "INTERFACE": "#af7aa1", "INTERROGATIVE": "#ff9da7", "PACKAGE": "#9c755f", "PLAN_TEMPLATE": "#bab0ab", "RECIPE": "#4e79a7", "SYNTACTIC_CONSTRUCT": "#f28e2c", "TYPE": "#e15759"};

const width = window.innerWidth;
const height = window.innerHeight - 52;

const svg = d3.select("#graph")
  .attr("viewBox", [0, 0, width, height])
  .call(d3.zoom().on("zoom", (event) => {
    g.attr("transform", event.transform);
  }));

// Arrowhead marker for directed edges
svg.append("defs").append("marker")
    .attr("id", "arrow")
    .attr("viewBox", "0 -5 10 10")
    .attr("refX", 14)
    .attr("refY", 0)
    .attr("markerWidth", 6)
    .attr("markerHeight", 6)
    .attr("orient", "auto-start-reverse")
  .append("path")
    .attr("d", "M0,-5L10,0L0,5")
    .attr("fill", "#555");

const g = svg.append("g");

const simulation = d3.forceSimulation(nodes)
  .force("link", d3.forceLink(links).id(d => d.id).distance(90).strength(0.6))
  .force("charge", d3.forceManyBody().strength(-280))
  .force("center", d3.forceCenter(width / 2, height / 2))
  .force("collide", d3.forceCollide(22))
  .force("x", d3.forceX(width / 2).strength(0.05))
  .force("y", d3.forceY(height / 2).strength(0.05));

const link = g.append("g")
  .attr("stroke", "#555")
  .attr("stroke-opacity", 0.55)
  .selectAll("line")
  .data(links)
  .join("line")
  .attr("class", "link")
  .attr("stroke-width", 1.2)
  .attr("marker-end", "url(#arrow)");

const linkLabel = g.append("g")
  .attr("class", "link-label")
  .selectAll("text")
  .data(links)
  .join("text")
  .attr("text-anchor", "middle")
  .attr("dy", -2)
  .attr("paint-order", "stroke")
  .attr("stroke", "#0a0a0a")
  .attr("stroke-width", "2.5px")
  .attr("stroke-linejoin", "round")
  .text(d => d.label);

const node = g.append("g")
  .selectAll("g")
  .data(nodes)
  .join("g")
  .attr("class", "node")
  .call(d3.drag()
    .on("start", dragstarted)
    .on("drag", dragged)
    .on("end", dragended));

node.append("circle")
  .attr("r", 7)
  .attr("fill", d => kindColors[d.kind] || "#888");

node.append("text")
  .attr("dx", 10)
  .attr("dy", 3)
  .text(d => d.short);

node.append("title")
  .text(d => d.id + "\n" + d.name + " [" + d.kind + "]");

simulation.on("tick", () => {
  link
    .attr("x1", d => d.source.x)
    .attr("y1", d => d.source.y)
    .attr("x2", d => d.target.x)
    .attr("y2", d => d.target.y);

  linkLabel
    .attr("x", d => (d.source.x + d.target.x) / 2)
    .attr("y", d => (d.source.y + d.target.y) / 2);

  node
    .attr("transform", d => "translate(" + d.x + "," + d.y + ")");
});

// Build legend
const legend = d3.select("#legend");
kinds.forEach(k => {
  const item = legend.append("div").attr("class", "legend-item");
  item.append("div")
    .attr("class", "legend-swatch")
    .style("background", kindColors[k] || "#888");
  item.append("span").text(k);
});

function dragstarted(event, d) {
  if (!event.active) simulation.alphaTarget(0.3).restart();
  d.fx = d.x; d.fy = d.y;
}
function dragged(event, d) {
  d.fx = event.x; d.fy = d.y;
}
function dragended(event, d) {
  if (!event.active) simulation.alphaTarget(0);
  d.fx = null; d.fy = null;
}

// Search / filter
const search = document.getElementById("search");
search.addEventListener("input", () => {
  const q = search.value.toLowerCase().trim();
  node.style("opacity", d => {
    if (!q) return 1;
    const hay = (d.id + " " + d.name + " " + d.kind).toLowerCase();
    return hay.includes(q) ? 1 : 0.12;
  });
  link.style("opacity", l => {
    if (!q) return 0.55;
    const sMatch = (l.source.id + " " + (l.source.name||l.source.short) + " " + l.source.kind).toLowerCase().includes(q);
    const tMatch = (l.target.id + " " + (l.target.name||l.target.short) + " " + l.target.kind).toLowerCase().includes(q);
    return (sMatch || tMatch) ? 0.75 : 0.06;
  });
});

document.getElementById("reset").addEventListener("click", () => {
  search.value = "";
  node.style("opacity", 1);
  link.style("opacity", 0.55);
  simulation.alpha(0.6).restart();
});

// Keyboard: press / to focus search
document.addEventListener("keydown", e => {
  if (e.key === "/" && document.activeElement.tagName === "BODY") {
    e.preventDefault();
    search.focus();
  }
});

console.log("Brain KB force graph ready —", nodes.length, "nodes,", links.length, "edges");
</script>
